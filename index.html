<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marcador de Tennis</title>
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>
    <header>
      <h1> Marcador de Tennis</h1>
    </header>

    <main>
      <section id="scoreboard">

        <div class="players-container">

          <div class="player-card">
            <h2>Player 1</h2>
            <div class="points-box">
              <span id="score-player1">0</span>
            </div>
          </div>

          <div class="player-card">
            <h2>Player 2</h2>
            <div class="points-box">
              <span id="score-player2">0</span>
            </div>
          </div>

        </div>

        <div class="result-container">
          <h3 id="resultado-div">Love - Love</h3>
        </div>

      </section>

      <section>
        <h2>Actualizar marcador</h2>

        <form id="marcador-form">
          <div>
            <label for="player1">Puntos Player 1:</label>
            <input 
              type="number" 
              id="player1" 
              min="0"
              required
            />
          </div>

          <div>
            <label for="player2">Puntos Player 2:</label>
            <input 
              type="number" 
              id="player2" 
              min="0"
              required
            />
          </div>

          <div>
            <button type="submit">Actualizar marcador</button>
          </div>
        </form>
      </section>

    </main>

    <script type="module" src="./src/presenter.js"></script>
  </body>
</html>
